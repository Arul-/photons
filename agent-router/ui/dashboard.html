<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mcp:ui-size" content="minWidth=700;minHeight=400;maxHeight=700">
  <title>Agent Router</title>
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #262626;
      --bg-card: #1e1e1e;
      --text-primary: #e6e6e6;
      --text-secondary: #a0a0a0;
      --text-muted: #666;
      --border-color: #333;
      --green: #10b981;
      --green-dim: rgba(16, 185, 129, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --orange: #f97316;
      --orange-dim: rgba(249, 115, 22, 0.15);
      --blue: #3b82f6;
      --blue-dim: rgba(59, 130, 246, 0.15);
      --purple: #8b5cf6;
      --purple-dim: rgba(139, 92, 246, 0.15);
      --yellow: #f59e0b;
      --yellow-dim: rgba(245, 158, 11, 0.15);
      --teal: #14b8a6;
      --teal-dim: rgba(20, 184, 166, 0.15);
    }

    :root.light {
      --bg-primary: #f4f4f5; --bg-secondary: #fafafa; --bg-tertiary: #e4e4e7;
      --bg-card: #ffffff; --text-primary: #18181b; --text-secondary: #52525b;
      --text-muted: #a1a1aa; --border-color: #d4d4d8;
      --green-dim: rgba(16,185,129,.1); --red-dim: rgba(239,68,68,.1);
      --orange-dim: rgba(249,115,22,.1); --blue-dim: rgba(59,130,246,.1);
      --purple-dim: rgba(139,92,246,.1); --yellow-dim: rgba(245,158,11,.1);
      --teal-dim: rgba(20,184,166,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      height: 100vh; display: flex; flex-direction: column;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }

    .summary-badge {
      font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600;
    }
    .summary-badge.idle { background: var(--bg-tertiary); color: var(--text-muted); }
    .summary-badge.active { background: var(--green-dim); color: var(--green); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; border: 1px solid var(--border-color);
      background: var(--bg-tertiary); color: var(--text-primary);
      cursor: pointer; transition: all 0.15s ease;
    }
    .btn:hover { background: var(--border-color); }

    .stats-bar {
      display: flex; gap: 20px; padding: 10px 16px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary); font-size: 13px;
    }
    .stat { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
    .stat .value { font-weight: 600; color: var(--text-primary); }

    .main { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── Agent Grid ── */
    .agent-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }

    .agent-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 16px; transition: border-color 0.15s;
    }
    .agent-card:hover { border-color: var(--text-muted); }

    .agent-card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }

    .agent-name {
      font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }

    .agent-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .agent-icon.claude { background: var(--orange-dim); color: var(--orange); }
    .agent-icon.gemini { background: var(--blue-dim); color: var(--blue); }
    .agent-icon.aider { background: var(--purple-dim); color: var(--purple); }
    .agent-icon.opencode { background: var(--teal-dim); color: var(--teal); }

    .agent-status-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .agent-status-dot.idle { background: var(--text-muted); }
    .agent-status-dot.running { background: var(--green); animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .agent-stats {
      display: flex; gap: 16px; font-size: 13px;
    }

    .agent-stat {
      display: flex; flex-direction: column; gap: 2px;
    }

    .agent-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .agent-stat-value { font-size: 20px; font-weight: 700; }

    .agent-runs {
      margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 8px;
    }

    .agent-run-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0; font-size: 12px; color: var(--text-secondary);
    }

    .agent-run-folder { font-weight: 500; color: var(--text-primary); }

    .pid-badge {
      font-family: monospace; background: var(--bg-tertiary);
      padding: 1px 6px; border-radius: 3px; font-size: 10px;
    }

    /* ── Default Agent ── */
    .config-section {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 14px 16px;
    }

    .config-section h3 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px;
    }

    .config-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; font-size: 13px;
    }

    .config-label { color: var(--text-secondary); }
    .config-value { font-weight: 600; }

    .default-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;
    }
    .default-badge.claude { background: var(--orange-dim); color: var(--orange); }
    .default-badge.gemini { background: var(--blue-dim); color: var(--blue); }
    .default-badge.aider { background: var(--purple-dim); color: var(--purple); }
    .default-badge.opencode { background: var(--teal-dim); color: var(--teal); }

    .auto-classify-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;
    }
    .auto-classify-badge.on { background: var(--green-dim); color: var(--green); }
    .auto-classify-badge.off { background: var(--bg-tertiary); color: var(--text-muted); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>Agent Router</h1>
      <span class="summary-badge idle" id="summaryBadge">Idle</span>
    </div>
    <button class="btn" id="refreshBtn">Refresh</button>
  </div>

  <div class="stats-bar">
    <div class="stat">Total Active <span class="value" id="totalActive">0</span></div>
    <div class="stat">Total Queued <span class="value" id="totalQueued">0</span></div>
  </div>

  <div class="main">
    <div class="agent-grid" id="agentGrid"></div>
    <div class="config-section" id="configSection">
      <h3>Routing Configuration</h3>
      <div class="config-row">
        <span class="config-label">Default Agent</span>
        <span class="config-value" id="defaultAgent"></span>
      </div>
      <div class="config-row">
        <span class="config-label">Auto-Classify</span>
        <span class="config-value" id="autoClassify"></span>
      </div>
    </div>
  </div>

  <script>
    let state = { claude: null, gemini: null, aider: null, opencode: null, totalActive: 0, totalQueued: 0 };

    const $ = id => document.getElementById(id);

    function parseMCP(raw) {
      if (raw && raw.content && Array.isArray(raw.content)) {
        const item = raw.content.find(c => c.type === 'text' && c.text);
        if (item) { try { return JSON.parse(item.text); } catch(e) { return item.text; } }
      }
      return raw;
    }

    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const secs = Math.floor(diff / 1000);
      if (secs < 60) return secs + 's';
      return Math.floor(secs / 60) + 'm';
    }

    const agents = [
      { key: 'claude', label: 'Claude', icon: 'C' },
      { key: 'gemini', label: 'Gemini', icon: 'G' },
      { key: 'aider', label: 'Aider', icon: 'A' },
      { key: 'opencode', label: 'OpenCode', icon: 'O' },
    ];

    function render() {
      $('totalActive').textContent = state.totalActive;
      $('totalQueued').textContent = state.totalQueued;

      const badge = $('summaryBadge');
      if (state.totalActive > 0) {
        badge.className = 'summary-badge active';
        badge.textContent = state.totalActive + ' running';
      } else {
        badge.className = 'summary-badge idle';
        badge.textContent = 'Idle';
      }

      $('agentGrid').innerHTML = agents.map(a => {
        const data = state[a.key] || { active: [], queued: 0 };
        const activeList = data.active || [];
        const queued = data.queued || 0;
        const isRunning = activeList.length > 0;

        return '<div class="agent-card">' +
          '<div class="agent-card-header">' +
            '<div class="agent-name">' +
              '<span class="agent-icon ' + a.key + '">' + a.icon + '</span>' +
              a.label +
            '</div>' +
            '<span class="agent-status-dot ' + (isRunning ? 'running' : 'idle') + '"></span>' +
          '</div>' +
          '<div class="agent-stats">' +
            '<div class="agent-stat"><span class="agent-stat-label">Active</span><span class="agent-stat-value">' + activeList.length + '</span></div>' +
            '<div class="agent-stat"><span class="agent-stat-label">Queued</span><span class="agent-stat-value">' + queued + '</span></div>' +
            '<div class="agent-stat"><span class="agent-stat-label">Max</span><span class="agent-stat-value">' + (data.maxConcurrent || '—') + '</span></div>' +
          '</div>' +
          (activeList.length > 0 ? '<div class="agent-runs">' + activeList.map(r =>
            '<div class="agent-run-item">' +
              '<span class="agent-run-folder">' + escapeHtml(r.groupFolder) + '</span>' +
              '<span>' + (r.pid ? '<span class="pid-badge">PID ' + r.pid + '</span> ' : '') + timeAgo(r.startedAt) + '</span>' +
            '</div>'
          ).join('') + '</div>' : '') +
        '</div>';
      }).join('');
    }

    async function loadStatus() {
      try {
        const raw = await window.photon.callTool('status', {});
        const data = parseMCP(raw);
        if (data && typeof data === 'object') {
          state = data;
          render();
        }
      } catch (e) { console.error('Status failed:', e); }
    }

    // ── Config display ──
    // These come from settings — read from widget state or inferred
    function renderConfig() {
      // Default agent — infer from settings or show 'claude'
      const defaultAgent = 'claude'; // settings aren't directly accessible from UI, show known default
      $('defaultAgent').innerHTML = '<span class="default-badge ' + defaultAgent + '">' + defaultAgent + '</span>';
      $('autoClassify').innerHTML = '<span class="auto-classify-badge off">Off</span>';
    }

    $('refreshBtn').addEventListener('click', loadStatus);

    if (window.photon) {
      if (window.photon.theme === 'light') document.documentElement.classList.add('light');
      window.photon.onThemeChange(theme => {
        document.documentElement.classList.toggle('light', theme === 'light');
      });

      window.photon.onResult((result) => {
        const data = parseMCP(result);
        if (data && typeof data === 'object' && 'totalActive' in data) {
          state = data;
          render();
        }
      });

      loadStatus();
      renderConfig();

      // Auto-refresh while agents are running
      setInterval(() => {
        if (state.totalActive > 0) loadStatus();
      }, 5000);
    }
  </script>
</body>
</html>
